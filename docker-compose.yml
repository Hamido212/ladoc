services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ladoc
      POSTGRES_PASSWORD: ladoc_dev
      POSTGRES_DB: ladoc
    volumes:
      - ladoc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ladoc"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ladoc_minio
      MINIO_ROOT_PASSWORD: ladoc_minio_secret
    volumes:
      - ladoc_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ladoc_minio ladoc_minio_secret &&
      mc mb --ignore-existing local/ladoc-assets &&
      mc anonymous set download local/ladoc-assets
      "
    restart: "no"

volumes:
  ladoc_pgdata:
  ladoc_minio:
